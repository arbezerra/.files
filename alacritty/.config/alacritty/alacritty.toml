[window]
opacity = 0.75
title = "Alacritty"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[terminal.shell]
program = "/usr/bin/zsh"

[font]
size = 12.0

[font.normal]
family = "MesloLGM Nerd Font Mono"
style = "Regular"

[font.bold]
family = "MesloLGM Nerd Font Mono"
style = "Bold"

[font.italic]
family = "MesloLGM Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "MesloLGM Nerd Font Mono"
style = "Bold Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

[hints]
alphabet = "jfkdls;ahgurieowpq"

[[hints.enabled]]
regex = "(https?://|file:|mailto:)[^\\s<>\"']+"
command = "xdg-open"
post_processing = true
persist = false
binding = { key = "E", mods = "Control|Shift" }
mouse = { enabled = true, mods = "None" }

[[keyboard.bindings]]
key = "Equals"
mods = "Control|Shift"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control|Shift"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
action = "SearchForward"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
text = "#1a1b26"
cursor = "#c0caf5"

[colors.selection]
text = "#c0caf5"
background = "#33467c"

[colors.normal]
black = "#15161e"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#a9b1d6"

[colors.bright]
black = "#414868"
red = "#f7768e"
green = "#9ece6a"
yellow = "#e0af68"
blue = "#7aa2f7"
magenta = "#bb9af7"
cyan = "#7dcfff"
white = "#c0caf5"
