---
dotfile_links:
  - src: bin/.local/bin/tmux-sessionizer
    dest: .local/bin/tmux-sessionizer
  - src: nvim/.config/nvim
    dest: .config/nvim
  - src: tmux/.tmux.conf
    dest: .tmux.conf
  - src: zsh/.zshrc
    dest: .zshrc
  - src: zsh/.p10k.zsh
    dest: .p10k.zsh
  - src: git/.gitconfig
    dest: .gitconfig
  - src: git/.gitpaneas
    dest: .gitpaneas
  - src: git/.gitpdtec
    dest: .gitpdtec
  - src: fonts/.fonts
    dest: .fonts
  - src: alacritty/.config/alacritty
    dest: .config/alacritty
  - src: kitty/.config/kitty
    dest: .config/kitty
  - src: mpv/.config/mpv
    dest: .config/mpv
