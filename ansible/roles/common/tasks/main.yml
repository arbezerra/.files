---
- name: Install Arch packages
  become: true
  ansible.builtin.package:
    name: "{{ arch_packages }}"
    state: present
  when: ansible_facts.os_family == "Archlinux"

- name: Check whether yay is installed
  ansible.builtin.command: yay --version
  register: yay_check
  changed_when: false
  failed_when: false
  when: ansible_facts.os_family == "Archlinux"

- name: Create yay build directory
  ansible.builtin.tempfile:
    state: directory
    suffix: yay
  register: yay_build_dir
  when:
    - ansible_facts.os_family == "Archlinux"
    - yay_check.rc != 0

- name: Clone yay
  ansible.builtin.git:
    repo: "{{ yay_repo }}"
    dest: "{{ yay_build_dir.path }}/yay"
    version: master
  when:
    - ansible_facts.os_family == "Archlinux"
    - yay_check.rc != 0

- name: Refresh sudo timestamp for yay install
  become: true
  ansible.builtin.command: "true"
  changed_when: false
  when:
    - ansible_facts.os_family == "Archlinux"
    - yay_check.rc != 0

- name: Install yay
  ansible.builtin.command:
    cmd: makepkg -si --noconfirm
    chdir: "{{ yay_build_dir.path }}/yay"
    creates: /usr/bin/yay
  when:
    - ansible_facts.os_family == "Archlinux"
    - yay_check.rc != 0

- name: Remove yay build directory
  ansible.builtin.file:
    path: "{{ yay_build_dir.path }}"
    state: absent
  when:
    - ansible_facts.os_family == "Archlinux"
    - yay_check.rc != 0
    - yay_build_dir.path is defined

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts.os_family == "Debian"

- name: Install Debian packages
  become: true
  ansible.builtin.apt:
    name: "{{ debian_packages }}"
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Install Poetry
  ansible.builtin.shell:
    cmd: curl -sSL https://install.python-poetry.org | python3 -
    creates: "{{ dotfiles_home }}/.local/bin/poetry"

- name: Install uv
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/install.sh | sh
    creates: "{{ dotfiles_home }}/.local/bin/uv"
