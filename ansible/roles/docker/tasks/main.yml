---
- name: Install Arch Docker packages
  become: true
  ansible.builtin.package:
    name: "{{ arch_docker_packages }}"
    state: present
  when: ansible_facts.os_family == "Archlinux"

- name: Create apt keyring directory
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - ansible_facts.os_family == "Debian"

- name: Download Docker apt key
  become: true
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ docker_apt_distribution }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when:
    - ansible_facts.os_family == "Debian"

- name: Add Docker apt repository
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/{{ docker_apt_distribution }}
      Suites: {{ ansible_facts.distribution_release }}
      Components: stable
      Signed-By: /etc/apt/keyrings/docker.asc
  when:
    - ansible_facts.os_family == "Debian"

- name: Update apt cache for Docker packages
  become: true
  ansible.builtin.apt:
    update_cache: true
  when:
    - ansible_facts.os_family == "Debian"

- name: Install Debian Docker packages
  become: true
  ansible.builtin.apt:
    name: "{{ debian_docker_packages }}"
    state: present
  when:
    - ansible_facts.os_family == "Debian"

- name: Load Docker kernel modules
  become: true
  ansible.builtin.command:
    cmd: modprobe "{{ item }}"
  loop: "{{ docker_kernel_modules }}"
  register: docker_module_loads
  changed_when: false
  failed_when: false

- name: Persist Docker networking sysctl settings
  become: true
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-docker.conf
    mode: "0644"
    content: |
      {% for setting in docker_sysctl_settings | dict2items %}
      {{ setting.key }} = {{ setting.value }}
      {% endfor %}
  register: docker_sysctl_config

- name: Apply Docker networking sysctl settings
  become: true
  ansible.builtin.command: sysctl --system
  when: docker_sysctl_config.changed
  changed_when: false
  failed_when: false

- name: Validate Docker iptables addrtype support
  become: true
  ansible.builtin.shell:
    cmd: |
      set -e
      iptables -w10 -t nat -A PREROUTING -m addrtype --dst-type LOCAL -j RETURN
      iptables -w10 -t nat -D PREROUTING -m addrtype --dst-type LOCAL -j RETURN
    executable: /bin/bash
  changed_when: false
  register: docker_iptables_check
  failed_when: false

- name: Report Docker reboot requirement
  ansible.builtin.debug:
    msg: |
      Docker bridge networking cannot use iptables addrtype on this running kernel.
      The playbook ensured Arch kernel/Docker networking packages are installed, but Docker cannot start until the running kernel has matching netfilter modules.
      Reboot, then rerun ./run.
      iptables error:
      {{ docker_iptables_check.stderr }}
  when: docker_iptables_check.rc != 0

- name: Enable Docker service
  become: true
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: docker_iptables_check.rc == 0

- name: Ensure Docker group exists
  become: true
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to Docker group
  become: true
  ansible.builtin.user:
    name: "{{ dotfiles_user }}"
    groups: docker
    append: true
