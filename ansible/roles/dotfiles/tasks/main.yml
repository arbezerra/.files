---
- name: Inspect existing dotfile destinations
  ansible.builtin.stat:
    path: "{{ dotfiles_home }}/{{ item.dest }}"
    follow: false
  loop: "{{ dotfile_links }}"
  register: dotfile_destinations

- name: Backup conflicting dotfile destinations
  ansible.builtin.command:
    argv:
      - mv
      - "{{ dotfiles_home }}/{{ item.item.dest }}"
      - "{{ dotfiles_home }}/{{ item.item.dest }}.bak-{{ ansible_date_time.epoch }}"
  when:
    - item.stat.exists
    - not item.stat.islnk or item.stat.lnk_source != dotfiles_dir ~ '/' ~ item.item.src
  loop: "{{ dotfile_destinations.results }}"
  loop_control:
    label: "{{ item.item.dest }}"

- name: Sync git submodule URLs
  ansible.builtin.command:
    cmd: git submodule sync --recursive
    chdir: "{{ dotfiles_dir }}"
  changed_when: false

- name: Check git submodule state
  ansible.builtin.command:
    cmd: git submodule status --recursive
    chdir: "{{ dotfiles_dir }}"
  register: git_submodules
  changed_when: false

- name: Clone git submodules
  ansible.builtin.command:
    cmd: git submodule update --init --recursive
    chdir: "{{ dotfiles_dir }}"
  when: git_submodules.stdout is search('(^|\n)[-+]')

- name: Create dotfile link parent directories
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/{{ item.dest | dirname }}"
    state: directory
    mode: "0755"
  loop: "{{ dotfile_links }}"
  when: item.dest | dirname != "."

- name: Link dotfiles
  ansible.builtin.file:
    src: "{{ dotfiles_dir }}/{{ item.src }}"
    dest: "{{ dotfiles_home }}/{{ item.dest }}"
    state: link
    force: false
  loop: "{{ dotfile_links }}"
