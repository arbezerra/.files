background_opacity 0.75

shell /usr/bin/zsh

font_family MesloLGM Nerd Font Mono
bold_font MesloLGM Nerd Font Mono Bold
italic_font MesloLGM Nerd Font Mono Italic
bold_italic_font MesloLGM Nerd Font Mono Bold Italic

font_size 12.0

scrollback_lines 10000
wheel_scroll_multiplier 3.0

placement_strategy center
dynamic_background_opacity yes
window_title_format {title}
tab_title_template {title}

cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 0

detect_urls yes
open_url_with default
url_style curly

map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
map ctrl+shift+f search_scrollback
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+n new_os_window
map ctrl+shift+t new_tab
map ctrl+shift+e open_url_with_hints
map f11 toggle_fullscreen

foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c
cursor #c0caf5
cursor_text_color #1a1b26

color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
