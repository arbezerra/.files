# Playback
SPACE cycle pause
p cycle pause
q quit
Q quit-watch-later
f cycle fullscreen
ENTER cycle fullscreen

# Seeking
LEFT seek -5 exact
RIGHT seek 5 exact
Shift+LEFT seek -30
Shift+RIGHT seek 30
Ctrl+LEFT seek -60
Ctrl+RIGHT seek 60
WHEEL_UP seek 10
WHEEL_DOWN seek -10

# Audio
UP add volume 5
DOWN add volume -5
m cycle mute
a cycle audio

# Subtitles
s cycle sub
v cycle sub-visibility
z add sub-delay -0.1
x add sub-delay 0.1

# Speed
[ add speed -0.1
] add speed 0.1
{ multiply speed 0.5
} multiply speed 2.0
BACKSPACE set speed 1.0

# Screenshots
S screenshot video
Ctrl+s screenshot subtitles

# Playlist
> playlist-next
< playlist-prev
